# alembic.ini — Alembic configuration for migrations

[alembic]
# Path to the migrations directory
script_location = migrations

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path to find modules
prepend_sys_path = .

# Timezone for timestamps
timezone = UTC

# Hook for before auto-generation
# before_revision_apply =

# Hook for after auto-generation
# after_revision_apply =

# Truncate slug field for auto-generated revision files
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version path separator; as mentioned above
# version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.
# version_path_separator = :
# version_path_separator = ;

# Set to 'true' to search source files recursively
# recursive_version_locations = false

# Version location specification
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# Version file naming convention
# output_encoding = utf-8

# Database connection URL
# IMPORTANT: In production, this should come from an environment variable
# No password because we use POSTGRES_HOST_AUTH_METHOD: trust for development
# Port 5433 to avoid conflict with local PostgreSQL
sqlalchemy.url = postgresql+asyncpg://cne_user@localhost:5433/cne_db

[post_write_hooks]
# Post-write hooks (formatters, linters)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
