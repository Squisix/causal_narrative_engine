# alembic.ini — Configuración de Alembic para migraciones

[alembic]
# Path al directorio de migraciones
script_location = migrations

# Template para nombres de archivos de migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path para encontrar los módulos
prepend_sys_path = .

# Timezone para timestamps
timezone = UTC

# Hook para antes de auto-generar
# before_revision_apply =

# Hook para después de auto-generar
# after_revision_apply =

# Truncate slug field for auto-generated revision files
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version path separator; as mentioned above
# version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.
# version_path_separator = :
# version_path_separator = ;

# Set to 'true' to search source files recursively
# recursive_version_locations = false

# Version location specification
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# Version file naming convention
# output_encoding = utf-8

# URL de conexión a la base de datos
# IMPORTANTE: En producción, esto debería venir de una variable de entorno
# Sin contraseña porque usamos POSTGRES_HOST_AUTH_METHOD: trust para desarrollo
# Puerto 5433 para evitar conflicto con PostgreSQL local
sqlalchemy.url = postgresql+asyncpg://cne_user@localhost:5433/cne_db

[post_write_hooks]
# Post-write hooks (formatters, linters)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
