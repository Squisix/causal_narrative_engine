# docker-compose.yml — Causal Narrative Engine (completo)
#
# Uso:
#   docker-compose up -d              Levantar todo
#   docker-compose up -d app postgres  Solo app + DB (sin Ollama)
#   docker-compose logs -f app         Ver logs de la app
#   docker-compose down                Detener servicios
#   docker-compose down -v             Detener y borrar volumenes

services:
  # ── App (FastAPI + Web UI) ───────────────────────────────
  app:
    build: .
    container_name: cne_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://cne_user:cne_password_dev@postgres:5432/cne_db
      - DEFAULT_AI_ADAPTER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"

  # ── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cne_postgres
    environment:
      POSTGRES_DB: cne_db
      POSTGRES_USER: cne_user
      POSTGRES_PASSWORD: cne_password_dev
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cne_user -d cne_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (LLMs locales) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cne_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Redis (cache, opcional) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cne_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Adminer (DB explorer) ────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: cne_adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

# Acceso:
#   Web UI:     http://localhost:8000/play
#   API Docs:   http://localhost:8000/docs
#   Adminer:    http://localhost:8080
#   PostgreSQL: localhost:5433
#   Ollama:     localhost:11434
